<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — Axiom</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <h1>Set New Password</h1>
      <p style="color: var(--gray-500); font-size: 14px; margin-bottom: 24px;">Enter your new password below.</p>

      <div class="error-msg" id="error-msg"></div>

      <form id="reset-form">
        <div class="form-group">
          <label for="password">New Password</label>
          <input type="password" id="password" class="form-control" placeholder="Min 6 characters" required minlength="6">
        </div>
        <div class="form-group">
          <label for="confirm-password">Confirm Password</label>
          <input type="password" id="confirm-password" class="form-control" placeholder="Re-enter password" required minlength="6">
        </div>
        <button type="submit" class="btn btn-primary" id="reset-btn">Update Password</button>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/config.js"></script>
  <script>
    const form = document.getElementById('reset-form');
    const errorMsg = document.getElementById('error-msg');
    const resetBtn = document.getElementById('reset-btn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorMsg.style.display = 'none';

      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm-password').value;

      if (password !== confirm) {
        errorMsg.textContent = 'Passwords do not match.';
        errorMsg.style.display = 'block';
        return;
      }

      resetBtn.disabled = true;
      resetBtn.textContent = 'Updating...';

      const { error } = await supabaseClient.auth.updateUser({ password });

      if (error) {
        errorMsg.textContent = error.message;
        errorMsg.style.display = 'block';
        resetBtn.disabled = false;
        resetBtn.textContent = 'Update Password';
        return;
      }

      errorMsg.textContent = 'Password updated. Redirecting to dashboard...';
      errorMsg.style.background = '#dcfce7';
      errorMsg.style.color = '#16a34a';
      errorMsg.style.display = 'block';

      setTimeout(() => {
        window.location.href = '/pages/dashboard.html';
      }, 1500);
    });
  </script>
</body>
</html>
